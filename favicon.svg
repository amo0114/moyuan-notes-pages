<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <defs>
        <style>
            .logo-shadow { filter: drop-shadow(0 4px 6px rgba(0, 30, 80, 0.15)); }
            .snow-l-1 { stop-color: #40C4FF; } .snow-l-2 { stop-color: #0091EA; }
            .snow-r-1 { stop-color: #18FFFF; } .snow-r-2 { stop-color: #00B0FF; }
            .tech-d-1 { stop-color: #1E88E5; } .tech-d-2 { stop-color: #0D47A1; }
            .tech-l-1 { stop-color: #2962FF; } .tech-l-2 { stop-color: #1565C0; }
            .star-1   { stop-color: #FFFFFF; } .star-2   { stop-color: #80D8FF; }
            @media (prefers-color-scheme: dark) {
                .logo-shadow { filter: drop-shadow(0 4px 12px rgba(0, 229, 255, 0.25)); }
                .tech-d-1 { stop-color: #2962FF; } .tech-d-2 { stop-color: #1E88E5; }
                .tech-l-1 { stop-color: #448AFF; } .tech-l-2 { stop-color: #2962FF; }
            }
        </style>
        <linearGradient id="snowLeft" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" class="snow-l-1"/><stop offset="100%" class="snow-l-2"/>
        </linearGradient>
        <linearGradient id="snowRight" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" class="snow-r-1"/><stop offset="100%" class="snow-r-2"/>
        </linearGradient>
        <linearGradient id="techDark" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" class="tech-d-1"/><stop offset="100%" class="tech-d-2"/>
        </linearGradient>
        <linearGradient id="techLight" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" class="tech-l-1"/><stop offset="100%" class="tech-l-2"/>
        </linearGradient>
        <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" class="star-1"/><stop offset="100%" class="star-2"/>
        </linearGradient>
    </defs>
    <g class="logo-shadow" stroke-linejoin="round" stroke-width="0.5">
        <polygon points="15,45 35,25 35,65 15,85" fill="url(#snowLeft)" stroke="url(#snowLeft)"/>
        <polygon points="85,45 65,25 65,65 85,85" fill="url(#snowRight)" stroke="url(#snowRight)"/>
        <polygon points="35,25 50,45 50,85 35,65" fill="url(#techDark)" stroke="url(#techDark)"/>
        <polygon points="65,25 50,45 50,85 65,65" fill="url(#techLight)" stroke="url(#techLight)"/>
    </g>
    <g stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" opacity="0.6">
        <line x1="20" y1="52" x2="30" y2="42" />
        <line x1="20" y1="60" x2="30" y2="50" />
        <line x1="20" y1="68" x2="26" y2="62" />
        <line x1="80" y1="52" x2="70" y2="42" />
        <line x1="80" y1="60" x2="70" y2="50" />
        <line x1="80" y1="68" x2="74" y2="62" />
    </g>
    <polyline points="35,25 50,45 65,25" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.7" stroke-linejoin="round"/>
    <line x1="50" y1="45" x2="50" y2="85" stroke="#ffffff" stroke-width="1.8" opacity="0.9" stroke-linecap="round"/>
    <g transform="translate(50, 13)">
        <polygon points="0,-7 3,0 0,7 -3,0" fill="url(#starGrad)" />
        <polygon points="-7,0 0,-2 7,0 0,2" fill="url(#starGrad)" opacity="0.9" />
        <circle cx="0" cy="0" r="1.5" fill="#ffffff" />
    </g>
</svg>